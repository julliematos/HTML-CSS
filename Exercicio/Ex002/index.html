<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafo</title>
</head>
<body>
    <hr>
    <p>Voicê pode 
        escrever um parágrafo 
        de qualquer jeito. 
        Basta colocar tudo 
        dentro do &lt;p&gt; e /hp.</p> <!--LESS THAN / GREATER THAN-->
    <p>Se precisar quebrar algum lugar específico <br> como esse, você pode usar a tag br</p>
    <P>Vamos adicionar alguns simbolos especiais:
        &reg;
        &copy;
        &trade; <!--Mais simbolos estão no PDF-->
    </P>
    <p>Vamso adicionar alguns emoji:
        &#x1F62D;
        </div>
    </p>
</body>
</html>
