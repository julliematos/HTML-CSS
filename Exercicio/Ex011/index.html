<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>Tente abrir esse site em vários dispositivos diferente ou diminua o tamanho do navegador</p>
    <p></p>

    <picture>
    <source media="(max-width: 750px)" srcset="Imagens/foto-p.png" type="image/png">
    <source media="(max-width: 1050px)" srcset="Imagens/photo-m.png" type="image/png">
<img src="Imagens/photo-g.png" alt="Imagem flexivel">
    </picture>

    <h1>Reproduzindo audio</h1>
    <p>Aprendendo a reproduzir audios em HTML5</p>
<audio preload="metadata" autoplay controls loop>
    <source src="midia/happy.mistake.mp3" type="audio/mpeg">
    <source src="midia/happy.mistake.ogg" type="audio/ogg">
    <source src="midia/happy.mistake.wav" type="audio/wav">
</audio>
<p>Infelizmente seu navegador não é compativel. <a href="midia/happy.mistake.mp3" target="_blank">Clique no link para baixar.</a></p>
</body>
</html>
